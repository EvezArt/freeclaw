<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FreeClaw">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>FreeClaw</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text2: #888;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --green: #00b894;
    --red: #e17055;
    --radius: 16px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 280px;
    background: var(--surface); border-right: 1px solid var(--border);
    transform: translateX(-100%); transition: transform 0.3s ease;
    z-index: 100; display: flex; flex-direction: column;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 18px; color: var(--accent2); }
  .sidebar-header p { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .new-chat-btn {
    margin: 12px 16px; padding: 12px; background: var(--accent);
    border: none; border-radius: 12px; color: white; font-size: 14px;
    font-weight: 600; cursor: pointer; width: calc(100% - 32px);
    transition: background 0.2s;
  }
  .new-chat-btn:hover { background: var(--accent2); }
  .convos { flex: 1; overflow-y: auto; padding: 8px; }
  .convo-item {
    padding: 12px; border-radius: 10px; cursor: pointer;
    transition: background 0.15s; margin-bottom: 2px;
  }
  .convo-item:hover, .convo-item.active { background: var(--surface2); }
  .convo-item .title { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .convo-item .meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .convo-item .delete-btn {
    float: right; background: none; border: none; color: var(--red);
    cursor: pointer; font-size: 16px; opacity: 0; transition: opacity 0.2s; padding: 0 4px;
  }
  .convo-item:hover .delete-btn { opacity: 1; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  /* Main */
  .main {
    display: flex; flex-direction: column; height: 100dvh;
    max-width: 800px; margin: 0 auto;
  }

  .header {
    display: flex; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid var(--border); background: var(--bg);
    gap: 12px; flex-shrink: 0;
  }
  .menu-btn, .model-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 8px 12px;
    cursor: pointer; font-size: 16px; transition: background 0.2s;
  }
  .menu-btn:hover, .model-btn:hover { background: var(--surface2); }
  .header-title { flex: 1; text-align: center; }
  .header-title h1 { font-size: 18px; font-weight: 700; }
  .header-title span { color: var(--accent2); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 16px; scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  .msg { display: flex; gap: 12px; max-width: 100%; animation: fadeIn 0.3s ease; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .msg.assistant .msg-avatar { background: var(--accent); }
  .msg.user .msg-avatar { background: var(--surface2); }
  .msg-bubble {
    padding: 12px 16px; border-radius: var(--radius); line-height: 1.6;
    font-size: 15px; word-wrap: break-word; overflow-wrap: break-word;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface); border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: var(--accent); color: white;
    border-top-right-radius: 4px;
  }
  .msg-bubble p { margin-bottom: 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble code {
    background: var(--surface2); padding: 2px 6px; border-radius: 4px;
    font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .msg-bubble pre {
    background: var(--surface2); padding: 12px; border-radius: 8px;
    overflow-x: auto; margin: 8px 0;
  }
  .msg-bubble pre code { background: none; padding: 0; }
  .msg-bubble strong { color: var(--accent2); }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
  .msg-bubble li { margin: 4px 0; }

  .typing-indicator {
    display: flex; gap: 4px; padding: 4px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px; background: var(--text2); border-radius: 50%;
    animation: bounce 1.4s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input */
  .input-area {
    padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom));
    border-top: 1px solid var(--border); background: var(--bg);
  }
  .input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  .input-row textarea {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px 16px; color: var(--text);
    font-size: 16px; font-family: inherit; resize: none; outline: none;
    min-height: 44px; max-height: 120px; line-height: 1.4;
    transition: border-color 0.2s;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text2); }
  .send-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 20px;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent2); }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* Model picker */
  .model-picker {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0; padding: 20px; z-index: 101;
    transform: translateY(100%); transition: transform 0.3s ease;
  }
  .model-picker.open { transform: translateY(0); }
  .model-picker h3 { margin-bottom: 16px; font-size: 16px; }
  .model-option {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    border-radius: 12px; cursor: pointer; transition: background 0.15s;
    border: 1px solid transparent; margin-bottom: 8px;
  }
  .model-option:hover { background: var(--surface2); }
  .model-option.active { border-color: var(--accent); background: var(--surface2); }
  .model-option .dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--green);
  }
  .model-option .info { flex: 1; }
  .model-option .info .name { font-weight: 600; font-size: 14px; }
  .model-option .info .desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .free-badge {
    display: inline-block; background: var(--green); color: #000;
    font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px;
  }

  /* Welcome */
  .welcome {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; padding: 40px 20px;
  }
  .welcome .logo { font-size: 64px; margin-bottom: 16px; }
  .welcome h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .welcome h2 span { color: var(--accent2); }
  .welcome p { color: var(--text2); font-size: 16px; max-width: 400px; margin-bottom: 24px; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .suggestion {
    padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s;
    color: var(--text);
  }
  .suggestion:hover { border-color: var(--accent); color: var(--accent2); }

  /* Responsive */
  @media (min-width: 768px) {
    .sidebar { transform: translateX(0); position: static; }
    .overlay { display: none; }
    .main { margin-left: 280px; }
    .menu-btn { display: none; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>🆓 FreeClaw</h2>
    <p>100% free. Forever.</p>
  </div>
  <button class="new-chat-btn" onclick="newChat()">+ New Chat</button>
  <div class="convos" id="convos"></div>
</div>

<div class="main">
  <div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="header-title">
      <h1>Free<span>Claw</span></h1>
    </div>
    <button class="model-btn" onclick="toggleModelPicker()" id="modelBtn">🧠</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="logo">🆓</div>
      <h2>Free<span>Claw</span></h2>
      <p>Your free AI assistant. No limits, no cost, no BS. Just talk.</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion('What can you do?')">What can you do?</div>
        <div class="suggestion" onclick="sendSuggestion('Write me a Python script')">Write me code</div>
        <div class="suggestion" onclick="sendSuggestion('Explain quantum computing simply')">Explain something</div>
        <div class="suggestion" onclick="sendSuggestion('Tell me a joke')">Make me laugh</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Say anything..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="model-picker" id="modelPicker">
  <h3>Choose your brain <span class="free-badge">ALL FREE</span></h3>
  <div id="modelList"></div>
</div>

<script>
const WS_URL = `ws${location.protocol === 'https:' ? 's' : ''}://${location.host}`;
let ws = null;
let currentConvo = null;
let currentModel = 'zai-org/GLM-5.1-FP8';
let messageHistory = [];
let isStreaming = false;
let allModels = [];

// Init
document.addEventListener('DOMContentLoaded', () => {
  loadModels();
  loadConvos();
  connectWS();
  document.getElementById('input').focus();
});

// WebSocket
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => console.log('Connected');
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onmessage = handleWSMessage;
}

function handleWSMessage(e) {
  const data = JSON.parse(e.data);
  if (data.type === 'token') {
    appendToken(data.token);
  } else if (data.type === 'done') {
    finishStream(data.fullReply);
  } else if (data.type === 'error') {
    finishStream('Error: ' + data.error);
  }
}

// Models
async function loadModels() {
  try {
    const r = await fetch('/api/models');
    allModels = await r.json();
    renderModels();
  } catch {}
}

function renderModels() {
  const el = document.getElementById('modelList');
  el.innerHTML = allModels.map(m => `
    <div class="model-option ${m.id === currentModel ? 'active' : ''}" onclick="selectModel('${m.id}')">
      <div class="dot"></div>
      <div class="info">
        <div class="name">${m.name} <span class="free-badge">FREE</span></div>
        <div class="desc">${m.desc}</div>
      </div>
    </div>
  `).join('');
  const active = allModels.find(m => m.id === currentModel);
  if (active) document.getElementById('modelBtn').textContent = '🧠 ' + active.name;
}

function selectModel(id) {
  currentModel = id;
  renderModels();
  toggleModelPicker();
}

function toggleModelPicker() {
  document.getElementById('modelPicker').classList.toggle('open');
}

// Conversations
async function loadConvos() {
  try {
    const r = await fetch('/api/conversations');
    const convos = await r.json();
    renderConvos(convos);
  } catch {}
}

function renderConvos(convos) {
  const el = document.getElementById('convos');
  el.innerHTML = convos.map(c => `
    <div class="convo-item ${c.id === currentConvo ? 'active' : ''}" onclick="loadConvo('${c.id}')">
      <button class="delete-btn" onclick="event.stopPropagation();deleteConvo('${c.id}')">×</button>
      <div class="title">${escapeHtml(c.title)}</div>
      <div class="meta">${c.count} messages</div>
    </div>
  `).join('');
}

async function loadConvo(id) {
  try {
    const r = await fetch(`/api/conversations/${id}`);
    const convo = await r.json();
    currentConvo = id;
    messageHistory = convo.messages || [];
    renderMessages();
    toggleSidebar();
  } catch {}
}

async function deleteConvo(id) {
  await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
  if (currentConvo === id) newChat();
  loadConvos();
}

function newChat() {
  currentConvo = 'fc_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  messageHistory = [];
  renderMessages();
  toggleSidebar();
}

// UI
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('active');
}

function renderMessages() {
  const el = document.getElementById('messages');
  const welcome = document.getElementById('welcome');

  if (messageHistory.length === 0) {
    el.innerHTML = '';
    el.appendChild(welcome);
    welcome.style.display = 'flex';
    return;
  }

  welcome.style.display = 'none';
  el.innerHTML = messageHistory.map(m => createMsgHtml(m.role, m.content)).join('');
  scrollToBottom();
}

function createMsgHtml(role, content) {
  const avatar = role === 'user' ? '👤' : '🆓';
  const formatted = formatMarkdown(content);
  return `<div class="msg ${role}">
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${formatted}</div>
  </div>`;
}

function formatMarkdown(text) {
  if (!text) return '';
  // Code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  text = text.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Line breaks
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Send
async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming) return;

  input.value = '';
  autoResize(input);

  // Remove welcome
  document.getElementById('welcome').style.display = 'none';

  if (!currentConvo) newChat();

  // Add user message
  messageHistory.push({ role: 'user', content: text });
  const msgEl = document.createElement('div');
  msgEl.className = 'msg user';
  msgEl.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble">${formatMarkdown(text)}</div>`;
  document.getElementById('messages').appendChild(msgEl);

  // Add streaming assistant placeholder
  const aiEl = document.createElement('div');
  aiEl.className = 'msg assistant';
  aiEl.id = 'streaming-msg';
  aiEl.innerHTML = `<div class="msg-avatar">🆓</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(aiEl);
  scrollToBottom();

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  // Stream via WS
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      type: 'chat',
      messages: messageHistory.filter(m => m.role !== 'assistant'),
      model: currentModel,
      conversationId: currentConvo
    }));
  } else {
    // Fallback to REST
    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: messageHistory.filter(m => m.role !== 'assistant'),
          model: currentModel,
          conversationId: currentConvo
        })
      });
      const data = await r.json();
      finishStream(data.reply);
    } catch (e) {
      finishStream('Connection error: ' + e.message);
    }
  }
}

let streamContent = '';

function appendToken(token) {
  streamContent += token;
  const bubble = document.querySelector('#streaming-msg .msg-bubble');
  if (bubble) {
    bubble.innerHTML = formatMarkdown(streamContent);
    scrollToBottom();
  }
}

function finishStream(fullReply) {
  if (!fullReply && streamContent) fullReply = streamContent;
  streamContent = '';
  isStreaming = false;
  document.getElementById('sendBtn').disabled = false;

  if (fullReply) {
    messageHistory.push({ role: 'assistant', content: fullReply });
    const el = document.getElementById('streaming-msg');
    if (el) {
      el.querySelector('.msg-bubble').innerHTML = formatMarkdown(fullReply);
      el.removeAttribute('id');
    }
  }
  scrollToBottom();
  loadConvos();
}

function sendSuggestion(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// Register SW for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
